<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background with rounded corners -->
  <rect width="64" height="64" rx="14" fill="#0C1B2E"/>

  <!-- Subtle inner glow -->
  <rect width="64" height="64" rx="14" fill="url(#glow)" opacity="0.4"/>

  <!-- Stylised "A" — triangle outline -->
  <polygon
    points="32,10 54,54 10,54"
    fill="none"
    stroke="#C4973A"
    stroke-width="4"
    stroke-linejoin="round"
  />

  <!-- Crossbar of the A -->
  <line
    x1="19"
    y1="40"
    x2="45"
    y2="40"
    stroke="#C4973A"
    stroke-width="4"
    stroke-linecap="round"
  />

  <!-- Inner fill triangle (small, subtle) -->
  <polygon
    points="32,18 48,50 16,50"
    fill="url(#innerFill)"
    opacity="0.12"
  />

  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#C4973A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C4973A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="innerFill" x1="32" y1="18" x2="32" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C4973A"/>
      <stop offset="100%" stop-color="#C4973A" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>